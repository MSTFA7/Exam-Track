<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamTrack</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>

<body>

    <div class="app">
        <header>
            <div class="header-left">
                <h1>Exam<span>Track</span></h1>
            </div>
            <div class="header-right">
                <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)" />
                <button class="btn btn-ghost" onclick="document.getElementById('import-input').click()">↑
                    Import</button>
                <button class="btn btn-ghost" onclick="exportData()">↓ Export</button>
                <button class="btn btn-primary" onclick="openModal()">+ Add Exam</button>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-label">Total Exams</div>
                <div class="stat-value accent" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Upcoming</div>
                <div class="stat-value" id="stat-upcoming">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">This Week</div>
                <div class="stat-value" style="color:var(--orange)" id="stat-week">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Completed</div>
                <div class="stat-value green" id="stat-done">0</div>
            </div>
        </div>

        <div class="controls">
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">All</button>
                <button class="filter-tab" data-filter="upcoming">Upcoming</button>
                <button class="filter-tab" data-filter="urgent">Urgent</button>
                <button class="filter-tab" data-filter="completed">Completed</button>
            </div>
            <select class="sort-select" id="sort-select" onchange="renderExams()">
                <option value="date-asc">Sort: Date ↑</option>
                <option value="date-desc">Sort: Date ↓</option>
                <option value="name">Sort: Name</option>
                <option value="priority">Sort: Priority</option>
            </select>
            <div class="view-toggle">
                <button class="view-btn active" data-view="grid" onclick="switchView('grid', this)">⊞ Grid</button>
                <button class="view-btn" data-view="calendar" onclick="switchView('calendar', this)">⊟ Calendar</button>
            </div>
        </div>

        <div class="exams-grid" id="exams-grid"></div>
        <div class="calendar-layout">
            <div id="calendar-wrapper" class="calendar-wrapper"></div>
        </div>
    </div>
    </div>
    <div class="calendar-sidebar" id="calendar-sidebar">
        <div class="sidebar-title">Card Fields</div>
        <p class="sidebar-desc">Subject and Exam Name are always shown.</p>
        <div class="sidebar-fields" id="sidebar-fields"></div>
    </div>
    <div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modal-title">Add Exam</div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="form-grid">
                <div class="form-group full">
                    <label>Exam Name *</label>
                    <input type="text" id="f-name" />
                </div>
                <div class="form-group">
                    <label>Subject / Course *</label>
                    <input type="text" id="f-subject" />
                </div>
                <div class="form-group">
                    <label>Course Code</label>
                    <input type="text" id="f-code" />
                </div>
                <div class="form-group">
                    <label>Exam Date *</label>
                    <input type="date" id="f-date" />
                </div>
                <div class="form-group">
                    <label>Exam Time *</label>
                    <input type="time" id="f-time" />
                </div>
                <div class="form-group">
                    <label>Duration (minutes)</label>
                    <input type="number" id="f-duration" />
                </div>
                <div class="form-group">
                    <label>Room</label>
                    <input type="text" id="f-location" />
                </div>
                <div class="form-group full">
                    <label>Priority</label>
                    <select id="f-priority">
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                        <option value="critical">Critical</option>
                    </select>
                </div>
                <div class="form-group full">
                    <label>Color Tag</label>
                    <div class="color-grid" id="color-grid"></div>
                </div>
                <div class="form-group full">
                    <label>Notes</label>
                    <textarea id="f-notes" placeholder="Topics to cover, materials allowed, reminders..."></textarea>
                </div>
            </div>
            <div class="form-actions">
                <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveExam()">Save Exam</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="script.js"></script>
</body>

</html>
